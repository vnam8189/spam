<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Xác thực thiết bị</title>
</head>
<body style="text-align: center; font-family: sans-serif; padding-top: 50px; background: #f4f4f4;">
    <h2 id="msg">Đang xác thực IP...</h2>
    <p>Vui lòng không thoát trình duyệt.</p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => {
                tg.sendData(JSON.stringify({
                    "ip": data.ip,
                    "user_id": tg.initDataUnsafe.user.id
                }));
                document.getElementById('msg').innerText = "✅ Đã lấy IP: " + data.ip;
                setTimeout(() => tg.close(), 1000);
            })
            .catch(() => {
                document.getElementById('msg').innerText = "❌ Lỗi lấy IP!";
            });
    </script>
</body>
</html>
